<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東方哲學館｜智慧特稿展示中心</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        :root {
            --zen-bg: #ffffff;
            --zen-ink: #1a202c;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--zen-bg);
            color: var(--zen-ink);
            margin: 0;
            padding: 0;
        }
        
        .font-serif { font-family: 'Noto Serif TC', serif; }

        /* --- 修正後的 Markdown 樣式 --- */
        .philosophy-body {
            line-height: 2.1;
            font-size: 1.15rem;
            color: #2d3748;
        }
        .philosophy-body h2 { 
            font-family: 'Noto Serif TC', serif;
            font-size: 1.8rem; 
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            font-weight: 900;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 0.5rem;
        }
        .philosophy-body p { margin-bottom: 1.5rem; text-align: justify; }
        .philosophy-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            display: block;
            overflow-x: auto;
            border: 1px solid #edf2f7;
        }
        .philosophy-body th { background: #f8fafc; padding: 12px; border: 1px solid #edf2f7; }
        .philosophy-body td { padding: 12px; border: 1px solid #edf2f7; }
        .philosophy-body blockquote {
            border-left: 4px solid #e2e8f0;
            padding: 1rem 1.5rem;
            background: #f8fafc;
            margin: 2rem 0;
            font-style: italic;
        }

        /* 側邊欄滑動動畫 */
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 派系配色 */
        .badge-ru { color: #9b2c2c; border-color: #feb2b2; background: #fff5f5; }
        .badge-dao { color: #22543d; border-color: #9ae6b4; background: #f0fff4; }
        .badge-fo { color: #b7791f; border-color: #fbd38d; background: #fffaf0; }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw3D4tlhV9d1wYlVZxR0XVSKUAQ_e4J-xCIURVB5DuOL0bSa-3adEDz3ozcC2Rym4UE/exec";

        const Icon = ({ name, size = 20, className = "" }) => (
            <i className={`lucide-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const App = () => {
            const [lessons, setLessons] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selected, setSelected] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(false);

            useEffect(() => {
                fetch(GAS_API_URL)
                    .then(res => res.json())
                    .then(data => {
                        setLessons(data);
                        if (data.length > 0) setSelected(data[data.length - 1]);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            // 派系樣式
            const getSectClass = (era = "") => {
                if (era.includes("儒")) return "badge-ru";
                if (era.includes("道")) return "badge-dao";
                if (era.includes("釋") || era.includes("佛") || era.includes("禪")) return "badge-fo";
                return "text-slate-500 border-slate-200 bg-slate-50";
            };

            // Markdown 解析優化 (容錯版)
            const getHtmlContent = (content) => {
                if (!content) return "";
                let clean = content.replace(/```json[\s\S]*?```/g, "");
                const parts = clean.split('---');
                // 如果格式正確(有三個部分)，取最後一部分；否則取全部
                const rawMarkdown = parts.length >= 3 ? parts.slice(2).join('---').trim() : clean.trim();
                return marked.parse(rawMarkdown);
            };

            if (loading) return (
                <div className="h-screen w-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-8 h-8 border-2 border-slate-200 border-t-slate-800 rounded-full animate-spin mb-4"></div>
                    <p className="text-[10px] font-black tracking-widest text-slate-400">LOADING WISDOM</p>
                </div>
            );

            return (
                <div className="flex h-screen w-screen bg-white relative overflow-hidden">
                    
                    {/* 手機頂部固定導航列 (Mobile Only) */}
                    <div className="md:hidden fixed top-0 left-0 right-0 h-16 bg-white/90 backdrop-blur-md border-b border-slate-100 flex items-center px-6 z-40">
                        <button onClick={() => setSidebarOpen(true)} className="p-2 -ml-2 text-slate-800 focus:outline-none">
                            <Icon name="menu" size={24} />
                        </button>
                        <h1 className="flex-1 text-center font-serif font-black text-lg tracking-[0.2em] mr-8">東方哲學館</h1>
                    </div>

                    {/* 側邊欄背景遮罩 (手機端開啟時) */}
                    {sidebarOpen && (
                        <div className="md:hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50" onClick={() => setSidebarOpen(false)} />
                    )}

                    {/* 側邊欄結構 */}
                    <aside className={`
                        fixed md:relative inset-y-0 left-0 w-72 bg-white border-r border-slate-50 flex flex-col z-[60] sidebar-transition
                        ${sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
                    `}>
                        <div className="p-8 pb-4">
                            <div className="flex justify-between items-center mb-8">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-slate-900 rounded-lg text-white"><Icon name="mountain" size={18} /></div>
                                    <h2 className="text-lg font-black font-serif">哲學清單</h2>
                                </div>
                                <button onClick={() => setSidebarOpen(false)} className="md:hidden text-slate-300"><Icon name="x" /></button>
                            </div>
                            <div className="relative">
                                <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300" />
                                <input 
                                    className="w-full pl-9 pr-3 py-2.5 bg-slate-50 rounded-xl text-xs outline-none border-none"
                                    placeholder="搜尋智慧..."
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto px-4 pb-10 space-y-2 custom-scroll">
                            {lessons.filter(l => (l.topic+l.era).includes(searchTerm)).map((item, idx) => (
                                <button
                                    key={item.fileName || idx}
                                    onClick={() => { setSelected(item); setSidebarOpen(false); }}
                                    className={`w-full text-left p-4 rounded-2xl transition-all ${
                                        selected?.fileName === item.fileName 
                                        ? 'bg-slate-900 text-white shadow-lg' 
                                        : 'hover:bg-slate-50 text-slate-500'
                                    }`}
                                >
                                    <div className="text-[9px] font-bold tracking-widest mb-1 opacity-50 uppercase">{item.era}</div>
                                    <div className="font-bold text-sm font-serif">{item.topic}</div>
                                </button>
                            ))}
                        </div>
                    </aside>

                    {/* 內文主顯示區 */}
                    <main className="flex-1 overflow-y-auto pt-16 md:pt-0 bg-white">
                        {selected ? (
                            <div className="max-w-2xl mx-auto py-12 md:py-24 px-6 md:px-12" key={selected.fileName}>
                                <header className="text-center mb-16">
                                    <div className={`inline-block px-4 py-1 rounded-full text-[10px] font-black tracking-widest mb-6 border ${getSectClass(selected.era)}`}>
                                        {selected.era}
                                    </div>
                                    <h2 className="text-4xl md:text-5xl font-black text-slate-900 mb-8 font-serif leading-tight">
                                        {selected.topic}
                                    </h2>
                                    <div className="w-12 h-0.5 bg-slate-100 mx-auto"></div>
                                </header>

                                <div 
                                    className="philosophy-body font-serif"
                                    dangerouslySetInnerHTML={{ __html: getHtmlContent(selected.fullContent) }}
                                />

                                <footer className="mt-20 pt-10 border-t border-slate-50 text-center text-slate-200 text-[9px] font-bold tracking-[0.3em] uppercase">
                                    <span>Wisdom Sync v2.1</span>
                                </footer>
                            </div>
                        ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-100">
                                <Icon name="wind" size={60} className="opacity-20 mb-4" />
                                <p className="text-[10px] font-black tracking-widest uppercase">Select an archive</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
