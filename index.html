<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東方哲學館｜數位智慧特稿</title>
    <!-- 載入必要套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #ffffff;
            color: #1a202c;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        
        .font-serif { font-family: 'Noto Serif TC', serif; }

        /* --- 核心：Markdown 內容渲染樣式 (徹底解決排版問題) --- */
        .markdown-render {
            line-height: 2.2;
            font-size: 1.125rem;
            color: #334155;
        }
        /* 標題樣式 */
        .markdown-render h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 2rem; color: #0f172a; text-align: center; font-family: 'Noto Serif TC', serif; }
        .markdown-render h2 { 
            font-family: 'Noto Serif TC', serif;
            font-size: 1.8rem; 
            margin: 3.5rem 0 1.5rem;
            font-weight: 900;
            color: #1a202c;
            border-left: 8px solid #1e293b;
            padding-left: 1.25rem;
        }
        .markdown-render p { margin-bottom: 1.8rem; text-align: justify; }
        
        /* 表格優化：解決「不偏不倚」文字擠壓問題 */
        .markdown-render table {
            width: 100%;
            border-collapse: collapse;
            margin: 2.5rem 0;
            font-size: 1rem;
            display: block; 
            overflow-x: auto; /* 手機端支援滑動 */
            border: 1px solid #e2e8f0;
            background: #ffffff;
        }
        .markdown-render th { background: #f8fafc; padding: 14px 20px; border: 1px solid #e2e8f0; font-weight: 900; color: #1e293b; text-align: left; min-width: 160px; }
        .markdown-render td { padding: 14px 20px; border: 1px solid #e2e8f0; vertical-align: top; min-width: 220px; line-height: 1.8; }

        .markdown-render blockquote {
            border-left: 5px solid #4f46e5;
            padding: 1.5rem 2rem;
            background: #f8fafc;
            margin: 2.5rem 0;
            color: #475569;
            font-style: italic;
            font-family: 'Noto Serif TC', serif;
        }

        /* 側邊欄滑動動畫 */
        .drawer-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 隱藏原生捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 派系配色標籤 */
        .sect-badge { display: inline-block; padding: 6px 20px; border-radius: 99px; font-size: 11px; font-weight: 900; border: 1px solid; letter-spacing: 3px; margin-bottom: 2rem; }
        .badge-ru { color: #9b2c2c; border-color: #feb2b2; background: #fff5f5; }
        .badge-dao { color: #22543d; border-color: #9ae6b4; background: #f0fff4; }
        .badge-fo { color: #b7791f; border-color: #fbd38d; background: #fffaf0; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 設定 Markdown 解析選項
        marked.setOptions({ gfm: true, breaks: true, tables: true });

        // 您的東方哲學館 API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbw3D4tlhV9d1wYlVZxR0XVSKUAQ_e4J-xCIURVB5DuOL0bSa-3adEDz3ozcC2Rym4UE/exec";

        const App = () => {
            const [lessons, setLessons] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selected, setSelected] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [isDrawerOpen, setIsDrawerOpen] = useState(false);

            useEffect(() => {
                fetch(API_URL)
                    .then(res => res.json())
                    .then(data => {
                        setLessons(data);
                        if (data.length > 0) setSelected(data[data.length - 1]);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            const getSectClass = (era = "") => {
                if (era.includes("儒")) return "badge-ru";
                if (era.includes("道")) return "badge-dao";
                if (era.includes("釋") || era.includes("佛")) return "badge-fo";
                return "text-slate-500 border-slate-200 bg-slate-50";
            };

            // 【終極修復邏輯】：徹底移除標題之前的所有 metadata 與表格碎屑
            const cleanContent = (raw) => {
                if (!raw) return "";
                // 1. 移除 JSON 塊
                let content = raw.replace(/```json[\s\S]*?```/g, "");
                
                // 2. 核心修正：尋找第一個「# 」（Markdown 標題）
                // 拋棄所有在標題之前的內容，因為那些是導致 ------- | :--- 的元兇
                const titlePos = content.search(/^#\s/m);
                if (titlePos !== -1) {
                    content = content.substring(titlePos);
                }
                
                return marked.parse(content);
            };

            if (loading) return (
                <div className="h-screen w-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-12 h-12 border-4 border-slate-100 border-t-slate-900 rounded-full animate-spin mb-6"></div>
                    <p className="text-xs font-black tracking-widest text-slate-400 uppercase">Synchronizing Wisdom...</p>
                </div>
            );

            return (
                <div className="flex h-screen w-screen bg-white relative overflow-hidden">
                    
                    {/* 手機端頂部欄：提供選單按鈕 */}
                    <header className="md:hidden fixed top-0 left-0 right-0 h-16 bg-slate-900 text-white flex items-center justify-between px-6 z-40 shadow-xl">
                        <button onClick={() => setIsDrawerOpen(true)} className="p-2">
                            <i className="lucide-menu text-2xl"></i>
                        </button>
                        <h1 className="font-serif font-black text-lg tracking-widest">東方哲學館</h1>
                        <div className="w-8"></div>
                    </header>

                    {/* 手機端側邊欄遮罩 */}
                    {isDrawerOpen && (
                        <div className="md:hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[50]" onClick={() => setIsDrawerOpen(false)} />
                    )}

                    {/* 響應式側邊欄：手機上隱藏，點擊才滑出 */}
                    <aside className={`
                        fixed md:relative inset-y-0 left-0 w-80 bg-white border-r border-slate-100 flex flex-col z-[60] drawer-transition
                        ${isDrawerOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
                    `}>
                        <div className="p-10 pb-6">
                            <div className="flex justify-between items-center mb-8">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-slate-900 rounded-2xl text-white shadow-lg"><i className="lucide-mountain text-xl"></i></div>
                                    <h2 className="text-xl font-black font-serif">專題清單</h2>
                                </div>
                                <button onClick={() => setIsDrawerOpen(false)} className="md:hidden text-slate-300 p-2">
                                    <i className="lucide-x text-2xl"></i>
                                </button>
                            </div>
                            <div className="relative mb-4">
                                <i className="lucide-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
                                <input 
                                    className="w-full pl-11 pr-4 py-3 bg-slate-50 rounded-2xl text-xs border-none outline-none focus:ring-1 focus:ring-slate-100"
                                    placeholder="搜尋智慧命題..."
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto px-6 pb-20 space-y-3 no-scrollbar mt-4">
                            {lessons.filter(l => (l.topic+l.era).includes(searchTerm)).map((item, idx) => (
                                <button
                                    key={item.fileName || idx}
                                    onClick={() => { setSelected(item); setIsDrawerOpen(false); document.getElementById('content-area').scrollTo(0,0); }}
                                    className={`w-full text-left p-6 rounded-[2.5rem] transition-all duration-300 ${
                                        selected?.fileName === item.fileName 
                                        ? 'bg-slate-900 text-white shadow-2xl -translate-y-1' 
                                        : 'hover:bg-slate-50 text-slate-500'
                                    }`}
                                >
                                    <div className={`text-[9px] font-black tracking-widest mb-2 uppercase ${selected?.fileName === item.fileName ? 'text-slate-400' : 'text-indigo-600'}`}>
                                        {item.era}
                                    </div>
                                    <div className="font-bold text-sm font-serif leading-tight">{item.topic}</div>
                                </button>
                            ))}
                        </div>
                    </aside>

                    {/* 內文主顯示區：手機端滿版優化 */}
                    <main id="content-area" className="flex-1 overflow-y-auto bg-white pt-16 md:pt-0 no-scrollbar scroll-smooth">
                        {selected ? (
                            <div className="max-w-4xl mx-auto py-12 md:py-24 px-8 md:px-16 animate-in fade-in duration-700" key={selected.fileName}>
                                <div className="text-center mb-16">
                                    <div className={`sect-badge ${getSectClass(selected.era)}`}>
                                        {selected.era}
                                    </div>
                                    <h2 className="text-4xl md:text-6xl font-black text-slate-900 mb-10 font-serif leading-tight tracking-tight px-4">
                                        {selected.topic}
                                    </h2>
                                    <div className="w-16 h-1 bg-slate-900 mx-auto rounded-full opacity-10"></div>
                                </div>

                                <div 
                                    className="markdown-render font-serif"
                                    dangerouslySetInnerHTML={{ __html: cleanContent(selected.fullContent) }}
                                />

                                <footer className="mt-40 pt-12 border-t border-slate-50 flex justify-between items-center text-slate-200 text-[10px] font-bold tracking-[0.5em] uppercase">
                                    <span>Wisdom Delivery v3.0</span>
                                    <span>{new Date().toLocaleDateString()}</span>
                                </footer>
                            </div>
                        ) : (
                            <div className="h-full flex flex-col items-center justify-center text-slate-100 italic">
                                <i className="lucide-wind text-8xl mb-6 opacity-20"></i>
                                <p className="text-xs tracking-[1em] uppercase">選擇篇章</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
